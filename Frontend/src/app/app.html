<div class="app-shell">
  @if (showNavbar()) {
    <app-navbar />
  }
  <div class="app-main">
    @if (showNavbar()) {
      <header class="topbar">
        <a class="btn-bell" routerLink="/notifications" routerLinkActive="active" title="Alertas">
          <span class="material-icons-round">notifications</span>
          @if (unreadCount() > 0) {
            <span class="bell-badge">{{ unreadCount() > 9 ? '9+' : unreadCount() }}</span>
          }
        </a>
        <a class="btn-bell" routerLink="/chat" routerLinkActive="active" title="Chat">
          <span class="material-icons-round">chat_bubble</span>
        </a>
        <a class="user-avatar" routerLink="/profile" routerLinkActive="active" [title]="userName()">
          @if (userPhotoUrl()) {
            <img [src]="userPhotoUrl()" alt="" />
          } @else {
            <span class="material-icons-round">account_circle</span>
          }
        </a>
        <button class="btn-logout" type="button" (click)="logout()" title="Cerrar sesión">
          <span class="material-icons-round">logout</span>
        </button>
      </header>
    }
    <main class="app-content">
      <router-outlet />
    </main>
  </div>
</div>
