<div class="app-shell">
  @if (showNavbar()) {
    <app-navbar />
  }
  <div class="app-main">
    @if (showNavbar()) {
      <header class="topbar">
        <a class="user-chip" routerLink="/profile" routerLinkActive="active">
          <span class="material-icons-round">account_circle</span>
          <span class="user-name">{{ userName() }}</span>
        </a>
        <button class="btn-logout" type="button" (click)="logout()" title="Cerrar sesión">
          <span class="material-icons-round">logout</span>
        </button>
      </header>
    }
    <main class="app-content">
      <router-outlet />
    </main>
  </div>
</div>
