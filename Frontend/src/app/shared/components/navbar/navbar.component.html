<aside class="sidebar">
  <a class="brand" routerLink="/dashboard">
    <img class="brand-img" src="BetterMeLogo.png" alt="BetterMe">
  </a>

  <nav class="nav-links">
    @for (link of links; track link.path) {
      <a
        class="nav-link"
        [routerLink]="link.path"
        routerLinkActive="active"
        [title]="link.label"
      >
        <span class="material-icons-round">{{ link.icon }}</span>
        <span class="link-label">{{ link.label }}</span>
      </a>
    }
  </nav>
</aside>

<header class="mobile-topbar">
  <a class="brand" routerLink="/dashboard">
    <img class="brand-img" src="BetterMeLogo.png" alt="BetterMe">
  </a>
  <span class="mobile-topbar-actions">
    <a class="btn-logout-mobile" routerLink="/notifications" routerLinkActive="active" title="Alertas">
      <span class="material-icons-round">notifications</span>
      @if (unreadCount() > 0) {
        <span class="bell-badge">{{ unreadCount() > 9 ? '9+' : unreadCount() }}</span>
      }
    </a>
    <button class="btn-logout-mobile" type="button" (click)="logout()" title="Cerrar sesión">
      <span class="material-icons-round">logout</span>
    </button>
  </span>
</header>

<nav class="tab-bar">
  @for (link of links; track link.path) {
    <a class="tab-link" [routerLink]="link.path" routerLinkActive="active">
      <span class="material-icons-round">{{ link.icon }}</span>
      <span class="tab-label">{{ link.label }}</span>
    </a>
  }
  <a class="tab-link" routerLink="/profile" routerLinkActive="active">
    <span class="material-icons-round">account_circle</span>
    <span class="tab-label">Perfil</span>
  </a>
</nav>
