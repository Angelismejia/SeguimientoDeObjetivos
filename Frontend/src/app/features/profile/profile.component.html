<div class="profile-page">
  @if (loading()) {
    <div class="state-msg">Cargando perfil...</div>
  } @else if (loadError()) {
    <div class="state-msg error">No se pudo cargar el perfil. Intenta de nuevo más tarde.</div>
  } @else if (user(); as u) {
    <div class="profile-header">
      <label class="photo-wrap" for="photo-input">
        @if (photoUrl()) {
          <img [src]="photoUrl()" alt="Foto de perfil" class="profile-photo" />
        } @else {
          <span class="material-icons-round photo-placeholder">account_circle</span>
        }
        <span class="photo-edit-badge">
          <span class="material-icons-round">photo_camera</span>
        </span>
      </label>
      <input id="photo-input" type="file" accept=".jpg,.jpeg,.png,.webp" (change)="onPhotoSelected($event)" hidden />

      <div class="profile-info">
        <h1>{{ u.name }}</h1>
        <p class="profile-username">&#64;{{ u.username }}</p>
        <p class="profile-email">{{ u.email }}</p>
      </div>
    </div>

    @if (uploading()) {
      <p class="upload-status">Subiendo foto...</p>
    }
    @if (uploadError()) {
      <p class="upload-status error">{{ uploadError() }}</p>
    }
  }
</div>
