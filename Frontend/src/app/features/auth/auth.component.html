<div class="page-bg">
  <div class="card" [class.active]="isRegister">

    <!-- FORMULARIO -->
    <div class="form-col">

      <div class="form-face login-face">
        <img src="BetterMeLogo.png" alt="BetterMe" class="form-logo">
        <h1>Iniciar Sesión</h1>
        <p class="sub-line">
          ¿No tienes cuenta?
          <button class="link-btn" (click)="switchTo('register')">Regístrate</button>
        </p>
        <form [formGroup]="loginForm" (ngSubmit)="submitLogin()">
          <div class="field">
            <label>Usuario</label>
            <input type="text" formControlName="username" placeholder="tu_usuario" autocomplete="username">
          </div>
          <div class="field">
            <label>Contraseña</label>
            <div class="input-wrap">
              <input [type]="hideLogin ? 'password' : 'text'" formControlName="password" placeholder="Mínimo 6 caracteres" autocomplete="current-password">
              <button type="button" class="eye-btn" (click)="hideLogin = !hideLogin">
                <svg *ngIf="hideLogin" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg *ngIf="!hideLogin" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>
          <button type="button" class="forgot-btn">¿Olvidaste tu contraseña?</button>
          <p class="form-error" *ngIf="loginError()">{{ loginError() }}</p>
          <button class="btn-main" type="submit" [disabled]="loginForm.invalid || loading()">
            {{ loading() ? 'Ingresando...' : 'Entrar' }}
          </button>
        </form>
      </div>

      <div class="form-face register-face">
        <img src="BetterMeLogo.png" alt="BetterMe" class="form-logo">
        <h1>Crear Cuenta</h1>
        <p class="sub-line">
          ¿Ya tienes cuenta?
          <button class="link-btn" (click)="switchTo('login')">Inicia sesión</button>
        </p>
        <form [formGroup]="registerForm" (ngSubmit)="submitRegister()">
          <div class="field">
            <label>Nombre completo</label>
            <input type="text" formControlName="name" placeholder="Tu nombre" autocomplete="name">
          </div>
          <div class="field">
            <label>Usuario</label>
            <input type="text" formControlName="username" placeholder="Nombre de usuario" autocomplete="username">
          </div>
          <div class="field">
            <label>Correo electrónico</label>
            <input type="email" formControlName="email" placeholder="tu@correo.com" autocomplete="email">
          </div>
          <div class="field">
            <label>Contraseña</label>
            <div class="input-wrap">
              <input [type]="hideRegister ? 'password' : 'text'" formControlName="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
              <button type="button" class="eye-btn" (click)="hideRegister = !hideRegister">
                <svg *ngIf="hideRegister" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg *ngIf="!hideRegister" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>
          <p class="form-error" *ngIf="registerError()">{{ registerError() }}</p>
          <button class="btn-main" type="submit" [disabled]="registerForm.invalid || loading()">
            {{ loading() ? 'Creando...' : 'Registrarme' }}
          </button>
        </form>
      </div>

    </div>

    <!-- IMAGEN -->
    <div class="image-col">
      <img src="loginimagen.png" alt="" class="illus-img">
    </div>

  </div>
</div>
