<div class="login-page">

  <!-- PANEL IZQUIERDO: formulario -->
  <div class="form-panel">
    <div class="form-card">
      <a class="back-brand" routerLink="/">
        <img src="BetterMeLogo.png" alt="BetterMe" class="form-logo">
      </a>

      <h1>Iniciar sesión</h1>
      <p class="subtitle">
        ¿No tienes cuenta?
        <a class="link" routerLink="/register">Regístrate aquí</a>
      </p>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="field">
          <label for="username">Usuario</label>
          <input
            id="username"
            type="text"
            formControlName="username"
            placeholder="Tu nombre de usuario"
            autocomplete="username"
          />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Mínimo 6 caracteres"
            autocomplete="current-password"
          />
        </div>

        <p class="error-msg" *ngIf="error">{{ error }}</p>

        <button class="btn-login" type="submit" [disabled]="form.invalid">
          INICIAR SESIÓN
        </button>
      </form>
    </div>
  </div>

  <!-- PANEL DERECHO: imagen -->
  <div class="image-panel">
    <img src="loginimagen.webp" alt="BetterMe" class="side-image">
  </div>

</div>
