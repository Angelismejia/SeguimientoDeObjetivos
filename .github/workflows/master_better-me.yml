# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - Better-Me

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Frontend

      - name: Build Angular app
        run: npm run build
        working-directory: Frontend

      - name: Copy Angular build into API wwwroot
        shell: bash
        run: |
          mkdir -p Backend/SeguimientoDeObjetivos.Api/wwwroot
          cp -r Frontend/dist/Frontend/browser/. Backend/SeguimientoDeObjetivos.Api/wwwroot/

      - name: Build with dotnet
        run: dotnet build Backend/SeguimientoDeObjetivos.sln --configuration Release

      - name: dotnet publish
        run: dotnet publish Backend/SeguimientoDeObjetivos.Api/SeguimientoDeObjetivos.Api.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Better-Me'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_4E5D268409DE4B97AB17E175C8A442EA }}